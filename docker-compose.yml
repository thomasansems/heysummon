# HeySummon — Self-Hosting via Docker Compose
# Uses pre-built images from GHCR. No source code required.
# Image: ghcr.io/thomasansems/heysummon
#
# Quick start:
#   curl -O https://raw.githubusercontent.com/thomasansems/heysummon/main/docker-compose.yml
#   curl -O https://raw.githubusercontent.com/thomasansems/heysummon/main/.env.example
#   cp .env.example .env  # then edit .env with your secrets
#   docker compose up -d
#
# To pin a specific version (default: latest):
#   HEYSUMMON_VERSION=0.1.0 docker compose up -d
#
# Tunnel profiles:
#   docker compose --profile cloudflare up -d
#   docker compose --profile tailscale up -d
#
# Contributing / building from source? Use docker-compose.dev.yml instead.

services:
  db-migrate:
    image: ghcr.io/thomasansems/heysummon:${HEYSUMMON_VERSION:-latest}
    entrypoint: ["sh", "-c", "pnpm exec prisma db push --skip-generate --accept-data-loss"]
    environment:
      DATABASE_URL: postgresql://heysummon:${DB_PASSWORD:-heysummon_dev}@db:5432/heysummon
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - backend
    environment:
      POSTGRES_USER: heysummon
      POSTGRES_PASSWORD: ${DB_PASSWORD:-heysummon_dev}
      POSTGRES_DB: heysummon
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heysummon"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: ghcr.io/thomasansems/heysummon:${HEYSUMMON_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${PORT:-3445}:3000"
    networks:
      - frontend
      - backend
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://heysummon:${DB_PASSWORD:-heysummon_dev}@db:5432/heysummon
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3445}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      HEYSUMMON_PUBLIC_URL: ${HEYSUMMON_PUBLIC_URL:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Tunnel Services (activate with --profile) ──

  # Cloudflare Tunnel: docker compose --profile cloudflare up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["cloudflare"]
    command: tunnel --no-autoupdate run
    networks:
      - frontend
    depends_on:
      app:
        condition: service_healthy
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Tailscale Funnel: docker compose --profile tailscale up -d
  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    profiles: ["tailscale"]
    hostname: heysummon
    networks:
      - frontend
    depends_on:
      app:
        condition: service_healthy
    environment:
      TS_AUTHKEY: ${TAILSCALE_AUTHKEY:-}
      TS_STATE_DIR: /var/lib/tailscale
      TS_EXTRA_ARGS: --advertise-tags=tag:heysummon
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale-config:/config:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  pgdata:
  tailscale-state:
