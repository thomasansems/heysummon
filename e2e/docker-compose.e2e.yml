# E2E test environment — self-contained platform + Guard + DB
# Usage: docker compose -f e2e/docker-compose.e2e.yml up -d
#        bash e2e/e2e-test.sh
#        docker compose -f e2e/docker-compose.e2e.yml down -v

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: heysummon
      POSTGRES_PASSWORD: heysummon_e2e
      POSTGRES_DB: heysummon_e2e
    ports:
      - "15432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heysummon"]
      interval: 2s
      timeout: 2s
      retries: 10

  guard:
    build:
      context: ../guard
      dockerfile: Dockerfile
    environment:
      PORT: "3000"
      PLATFORM_URL: "http://app:3000"
      GUARD_SIGNING_KEY: "${GUARD_SIGNING_KEY}"
    ports:
      - "3457:3000"
    depends_on:
      app:
        condition: service_healthy

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql://heysummon:heysummon_e2e@db:5432/heysummon_e2e"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "e2e-secret"
      REQUIRE_GUARD: "true"
      GUARD_PUBLIC_KEY: "${GUARD_PUBLIC_KEY}"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 20
