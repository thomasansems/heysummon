<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HeySummon - AI Does the Work. Humans Make the Calls.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Joti+One&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Umami analytics (privacy-friendly, GDPR-compliant, no cookies for tracking) -->
    <!-- Set VITE_UMAMI_URL and VITE_UMAMI_WEBSITE_ID env vars to activate -->
    <script>
      (function() {
        var id = '%VITE_UMAMI_WEBSITE_ID%';
        var url = '%VITE_UMAMI_URL%';
        if (id && url && !id.startsWith('%')) {
          var s = document.createElement('script');
          s.defer = true;
          s.dataset.websiteId = id;
          s.src = url + '/script.js';
          document.head.appendChild(s);
        }
      })();
    </script>
  </body>
</html>
