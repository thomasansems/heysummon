name: NPX Test

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "e2e/npx-full-circle.sh"
      - "prisma/schema.prisma"
      - "prisma/migrations/**"
      - "src/**"
      - "package.json"
      - ".github/workflows/npx-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "cli/**"
      - "e2e/npx-full-circle.sh"
      - "prisma/schema.prisma"
      - "prisma/migrations/**"
      - "src/**"
      - "package.json"
      - ".github/workflows/npx-test.yml"
  workflow_dispatch:

concurrency:
  group: npx-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXTAUTH_SECRET: ci-test-secret

jobs:
  npx-full-circle:
    name: NPX Full-Circle Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build consumer-sdk sibling for local resolution
        working-directory: packages/consumer-sdk
        run: |
          # NPX test uses npm (not pnpm), so the workspace:^ reference in cli/package.json
          # cannot be resolved from the public registry until both packages are published in
          # lockstep. Build the sibling here and swap the dependency to a file: reference below.
          npm install --no-audit --no-fund
          npm run build

      - name: Resolve workspace dependencies for npm
        working-directory: cli
        run: |
          # Rewrite workspace:^ to a file: reference pointing at the sibling package we just built.
          # This matches what pnpm does via workspace linking and keeps the NPX flow hermetic.
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.dependencies['@heysummon/consumer-sdk'] = 'file:../packages/consumer-sdk';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Updated cli/package.json: @heysummon/consumer-sdk -> file:../packages/consumer-sdk"

      - name: Build CLI from source
        working-directory: cli
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Run init from source
        run: node cli/bin/cli.js --yes --from-source .

      - name: Wait for healthy app
        run: |
          echo "Waiting for app health endpoint on port 3435..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:3435/api/v1/health > /dev/null 2>&1; then
              echo "App is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/90 - not ready, waiting 2s..."
            sleep 2
          done
          echo "App failed to become healthy after 90 attempts"
          exit 1

      - name: Verify API health
        run: |
          HEALTH=$(curl -sf http://localhost:3435/api/v1/health)
          echo "Health response: $HEALTH"
          echo "$HEALTH" | grep -q '"status":"ok"'
          echo "API health verified"

      - name: Verify auth endpoints
        run: |
          # Signup page should be accessible (may redirect on fresh install)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3435/auth/signup)
          echo "Signup page status: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ] || [ "$STATUS" = "302" ]

          # Following redirects, the final page should be 200
          FINAL=$(curl -sL -o /dev/null -w "%{http_code}" http://localhost:3435/auth/signup)
          echo "Signup page final status (following redirects): $FINAL"
          [ "$FINAL" = "200" ]

      - name: CLI status check (running)
        run: |
          OUTPUT=$(node cli/bin/cli.js status 2>&1) || true
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "running"

      - name: CLI stop
        run: |
          node cli/bin/cli.js stop 2>&1 || true
          echo "Waiting for server to stop..."
          for i in $(seq 1 15); do
            if ! curl -sf http://localhost:3435/api/v1/health > /dev/null 2>&1; then
              echo "Server stopped (attempt $i)"
              exit 0
            fi
            sleep 1
          done
          echo "Server still running after stop"
          exit 1

      - name: CLI status check (stopped)
        run: |
          OUTPUT=$(node cli/bin/cli.js status 2>&1) || true
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "stopped\|not running\|not initialized"

      - name: Assert port 3435 is free after stop
        run: |
          # Belt-and-braces check for HEY-398: confirm the previous server
          # actually released the port. If anything is still listening,
          # surface it now so the restart failure mode is obvious.
          if ss -lnt | awk '{print $4}' | grep -Eq '(^|:)3435$'; then
            echo "Port 3435 is still in use after CLI stop:"
            ss -lntp | grep ':3435' || true
            echo ""
            echo "Processes potentially holding the port:"
            ps -ef | grep -E 'node|next' | grep -v grep || true
            exit 1
          fi
          echo "Port 3435 is free"

      - name: CLI start daemon
        run: |
          node cli/bin/cli.js start -d 2>&1
          sleep 2
          # Check if the process survived startup
          PID=$(cat ~/.heysummon/heysummon.pid 2>/dev/null || echo "none")
          echo "Daemon PID: $PID"
          if [ "$PID" != "none" ] && kill -0 "$PID" 2>/dev/null; then
            echo "Process $PID is alive"
          else
            echo "Process $PID is NOT alive - checking what happened"
            ls -la ~/.heysummon/app/.next/standalone/ 2>/dev/null || echo "No standalone dir"
            echo "Trying foreground start for diagnostics..."
            timeout 10 node cli/bin/cli.js start 2>&1 || true
          fi

      - name: Wait for healthy app after restart
        run: |
          echo "Waiting for app after restart..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:3435/api/v1/health > /dev/null 2>&1; then
              echo "App is healthy (attempt $i)"
              exit 0
            fi
            # Check if process is still alive every 10 attempts
            if [ $((i % 10)) -eq 0 ]; then
              PID=$(cat ~/.heysummon/heysummon.pid 2>/dev/null || echo "none")
              if [ "$PID" != "none" ] && ! kill -0 "$PID" 2>/dev/null; then
                echo "Process $PID died - aborting wait"
                exit 1
              fi
            fi
            echo "Attempt $i/90 - not ready, waiting 2s..."
            sleep 2
          done
          echo "App failed to become healthy after restart"
          exit 1

      - name: CLI status check (running after restart)
        run: |
          OUTPUT=$(node cli/bin/cli.js status 2>&1) || true
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "running"

      - name: Capture logs on failure
        if: failure()
        run: |
          echo "=== ~/.heysummon contents ===" > npx-test-logs.txt
          ls -la ~/.heysummon/ >> npx-test-logs.txt 2>&1 || true
          echo "" >> npx-test-logs.txt
          echo "=== .env (secrets redacted) ===" >> npx-test-logs.txt
          cat ~/.heysummon/.env 2>/dev/null | sed 's/SECRET=".*/SECRET="[REDACTED]"/' >> npx-test-logs.txt || true
          echo "" >> npx-test-logs.txt
          echo "=== App directory ===" >> npx-test-logs.txt
          ls -la ~/.heysummon/app/ >> npx-test-logs.txt 2>&1 || true
          echo "" >> npx-test-logs.txt
          echo "=== Next.js build output ===" >> npx-test-logs.txt
          ls -la ~/.heysummon/app/.next/standalone/ >> npx-test-logs.txt 2>&1 || true
          echo "" >> npx-test-logs.txt
          echo "=== PID file ===" >> npx-test-logs.txt
          cat ~/.heysummon/heysummon.pid >> npx-test-logs.txt 2>&1 || true
          echo "" >> npx-test-logs.txt
          echo "=== Node processes ===" >> npx-test-logs.txt
          ps aux | grep node >> npx-test-logs.txt 2>&1 || true
          echo "" >> npx-test-logs.txt
          echo "=== Port 3435 listeners ===" >> npx-test-logs.txt
          ss -lntp | grep ':3435' >> npx-test-logs.txt 2>&1 || echo "(nothing listening on :3435)" >> npx-test-logs.txt
          echo "" >> npx-test-logs.txt
          echo "=== server.log (last 200 lines) ===" >> npx-test-logs.txt
          tail -n 200 ~/.heysummon/server.log >> npx-test-logs.txt 2>&1 || echo "(no server.log)" >> npx-test-logs.txt

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npx-full-circle-logs
          path: npx-test-logs.txt
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          node cli/bin/cli.js stop 2>&1 || true
          rm -rf ~/.heysummon

  tunnel-detection:
    name: Tunnel Detection Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Verify cloudflared available
        run: |
          cloudflared --version
          echo "cloudflared is available for tunnel testing"

      - name: Verify Tailscale not available
        run: |
          if which tailscale > /dev/null 2>&1; then
            echo "UNEXPECTED: tailscale is installed on this runner"
            exit 1
          fi
          echo "Tailscale correctly not available (expected in CI)"
