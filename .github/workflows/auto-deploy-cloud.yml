name: AUTO Deploy - Cloud

on:
  push:
    branches: [main]
    paths:
      - 'vercel-waitlist/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy cloud app to Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vercel-waitlist/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: vercel-waitlist

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: vercel-waitlist
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CLOUD }}

      - name: Build cloud app
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: vercel-waitlist
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CLOUD }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: vercel-waitlist
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CLOUD }}
