# Development Docker Compose — builds images from local source
# Use this if you are contributing to HeySummon or want to run from source.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#
# Tunnel profiles:
#   docker compose -f docker-compose.dev.yml --profile cloudflare up -d
#
# For production self-hosting (no source code needed), use docker-compose.yml instead.

services:
  db-migrate:
    build:
      context: .
      target: deps
    entrypoint:
      - sh
      - -c
      - |
        echo 'Running database migration...'
        tries=0
        until pnpm exec prisma db push --schema /app/prisma/schema.prisma --skip-generate --accept-data-loss 2>&1; do
          tries=$$((tries + 1))
          if [ $$tries -ge 10 ]; then
            echo 'Migration failed after 10 attempts'
            exit 1
          fi
          echo "Attempt $$tries failed — retrying in 3s..."
          sleep 3
        done
    environment:
      DATABASE_URL: postgresql://heysummon:${DB_PASSWORD:-heysummon_dev}@db:5432/heysummon
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - backend
    environment:
      POSTGRES_USER: heysummon
      POSTGRES_PASSWORD: ${DB_PASSWORD:-heysummon_dev}
      POSTGRES_DB: heysummon
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heysummon -d heysummon && psql -U heysummon -d heysummon -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3445}:3000"
    networks:
      - frontend
      - backend
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://heysummon:${DB_PASSWORD:-heysummon_dev}@db:5432/heysummon
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3445}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      HEYSUMMON_PUBLIC_URL: ${HEYSUMMON_PUBLIC_URL:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Tunnel Services (activate with --profile) ──

  # Cloudflare Tunnel: docker compose -f docker-compose.dev.yml --profile cloudflare up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["cloudflare"]
    command: tunnel --no-autoupdate run
    networks:
      - frontend
    depends_on:
      app:
        condition: service_healthy
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Prisma Studio: docker compose -f docker-compose.dev.yml --profile debug up -d
  prisma-studio:
    build:
      context: .
      target: deps
    restart: unless-stopped
    profiles: ["debug"]
    entrypoint: ["sh", "-c", "pnpm exec prisma studio --port 3447 --browser none"]
    ports:
      - "${PRISMA_STUDIO_PORT:-3447}:3447"
    networks:
      - backend
      - frontend
    environment:
      DATABASE_URL: postgresql://heysummon:${DB_PASSWORD:-heysummon_dev}@db:5432/heysummon
    depends_on:
      db:
        condition: service_healthy

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  pgdata:
