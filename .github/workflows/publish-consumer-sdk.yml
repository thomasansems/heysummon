name: Publish @heysummon/consumer-sdk to npm

on:
  push:
    paths:
      - "packages/consumer-sdk/package.json"
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no actual publish)"
        required: false
        default: "false"
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: packages/consumer-sdk
        run: pnpm run build

      - name: Get package version
        id: pkg
        run: echo "version=$(node -p "require('./packages/consumer-sdk/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if version already published
        id: check
        run: |
          if npm view @heysummon/consumer-sdk@${{ steps.pkg.outputs.version }} version 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false' && inputs.dry_run != 'true'
        working-directory: packages/consumer-sdk
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run publish
        if: inputs.dry_run == 'true'
        working-directory: packages/consumer-sdk
        run: pnpm publish --dry-run --no-git-checks

      - name: Skip (already published)
        if: steps.check.outputs.exists == 'true'
        run: echo "Version ${{ steps.pkg.outputs.version }} already on npm — bump the version to publish."
