name: OWASP ZAP Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: zap-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  security-events: write

env:
  DATABASE_URL: file:${{ github.workspace }}/prisma/zap-test.db
  APP_PORT: 3000
  GUARD_PORT: 3457

jobs:
  zap-api-scan:
    name: OWASP ZAP API Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── Install dependencies ──────────────────────────────────────────────
      - name: Install platform dependencies
        run: npm ci

      - name: Install guard dependencies
        run: cd guard && npm ci

      # ── Generate Ed25519 keypair ──────────────────────────────────────────
      - name: Generate Ed25519 keypair for Guard
        id: guard-keys
        run: |
          KEYS=$(node -e "
            const { sign } = require('tweetnacl');
            const kp = sign.keyPair();
            console.log(JSON.stringify({
              signingKey: Buffer.from(kp.secretKey).toString('hex'),
              publicKey: Buffer.from(kp.publicKey).toString('hex'),
            }));
          ")
          echo "signing_key=$(echo "$KEYS" | jq -r .signingKey)" >> "$GITHUB_OUTPUT"
          echo "public_key=$(echo "$KEYS" | jq -r .publicKey)" >> "$GITHUB_OUTPUT"

      # ── Setup database ────────────────────────────────────────────────────
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./zap-test.db"

      - name: Run migrations
        run: npx prisma db push --force-reset
        env:
          DATABASE_URL: "file:./zap-test.db"

      - name: Seed ZAP test data
        id: seed
        run: |
          SEED_OUTPUT=$(bash e2e/seed-e2e.sh 2>/dev/null)
          echo "seed_json=$SEED_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "$SEED_OUTPUT" | jq .
        env:
          NEXTAUTH_SECRET: e2e-secret

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build platform
        run: npm run build
        env:
          NEXTAUTH_SECRET: e2e-secret

      - name: Build guard
        run: cd guard && npm run build

      # ── Start platform ────────────────────────────────────────────────────
      - name: Start platform
        run: |
          npm start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:${{ env.APP_PORT }}/api/v1/health && break || sleep 2
          done
        env:
          NEXTAUTH_URL: http://localhost:${{ env.APP_PORT }}
          NEXTAUTH_SECRET: e2e-secret
          PORT: ${{ env.APP_PORT }}
          # REQUIRE_GUARD=true: platform rejects any request not signed by the Guard.
          # ZAP must go through the Guard (GUARD_PORT) — direct platform calls return 403.
          REQUIRE_GUARD: "true"
          GUARD_PUBLIC_KEY: ${{ steps.guard-keys.outputs.public_key }}
          E2E_RATE_LIMIT_BYPASS_SECRET: zap-bypass-secret-do-not-use-in-prod

      - name: Start guard
        run: |
          cd guard && node dist/index.js &
          for i in $(seq 1 15); do
            curl -sf http://localhost:${{ env.GUARD_PORT }}/health && break || sleep 1
          done
        env:
          PORT: ${{ env.GUARD_PORT }}
          PLATFORM_URL: http://localhost:${{ env.APP_PORT }}
          GUARD_SIGNING_KEY: ${{ steps.guard-keys.outputs.signing_key }}

      # ── Generate OpenAPI spec for ZAP ─────────────────────────────────────
      # IMPORTANT: base-url points to the GUARD port, not the platform directly.
      # This ensures ZAP tests go through the Guard content-safety pipeline.
      # Any request that bypasses the Guard will get 403 from the platform (REQUIRE_GUARD=true).
      - name: Generate OpenAPI spec
        run: |
          SEED='${{ steps.seed.outputs.seed_json }}'
          PROVIDER_KEY=$(echo "$SEED" | jq -r .providerKey)
          CLIENT_KEY=$(echo "$SEED" | jq -r .clientKey)

          node .github/zap/generate-api-spec.js \
            --base-url http://localhost:${{ env.GUARD_PORT }} \
            --provider-key "$PROVIDER_KEY" \
            --client-key "$CLIENT_KEY" \
            --output ${{ github.workspace }}/heysummon-openapi.json

          echo "✅ OpenAPI spec generated (base-url = Guard port ${{ env.GUARD_PORT }}):"
          jq '.paths | keys[]' ${{ github.workspace }}/heysummon-openapi.json

      # ── Malicious content check (fails CI if Guard lets bad payloads through) ──
      - name: Run malicious content check
        run: |
          SEED='${{ steps.seed.outputs.seed_json }}'
          export E2E_CLIENT_KEY=$(echo "$SEED" | jq -r .clientKey)
          export E2E_PROVIDER_KEY=$(echo "$SEED" | jq -r .providerKey)
          export E2E_BASE_URL=http://localhost:${{ env.APP_PORT }}
          export GUARD_URL=http://localhost:${{ env.GUARD_PORT }}
          bash e2e/zap-malicious-check.sh

      # ── OWASP ZAP API Scan ────────────────────────────────────────────────
      - name: Run OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.9.0
        env:
          # ZAP sends this header with every request → bypasses rate limiter
          ZAP_AUTH_HEADER: x-e2e-bypass
          ZAP_AUTH_HEADER_VALUE: zap-bypass-secret-do-not-use-in-prod
        with:
          target: heysummon-openapi.json
          format: openapi
          cmd_options: >-
            -J zap-report.json
            -w zap-report.md
            -r zap-report.html
            -I
          allow_issue_writing: true
          fail_action: false

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report-${{ github.sha }}
          path: |
            zap-report.html
            zap-report.json
            zap-report.md
          retention-days: 30

      # ── Verify Guard is actually enforced ────────────────────────────────
      # Direct call to the platform (bypassing Guard) MUST return 403.
      # If it returns 200, the Guard enforcement is broken.
      - name: Verify Guard enforcement (direct platform calls must be rejected)
        if: always()
        run: |
          SEED='${{ steps.seed.outputs.seed_json }}'
          CLIENT_KEY=$(echo "$SEED" | jq -r .clientKey)

          echo "── Verifying Guard enforcement ──"
          echo "Sending request DIRECTLY to platform (port ${{ env.APP_PORT }}) — must return 403"

          STATUS=$(curl -s -o /tmp/direct-response.json -w "%{http_code}" \
            -X POST "http://localhost:${{ env.APP_PORT }}/api/v1/help" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $CLIENT_KEY" \
            -d '{"apiKey":"'"$CLIENT_KEY"'","question":"Guard bypass test","signPublicKey":"test","encryptPublicKey":"test"}')

          echo "Direct platform response: HTTP $STATUS"
          cat /tmp/direct-response.json

          if [ "$STATUS" != "403" ]; then
            echo "❌ FAIL: Platform accepted a direct request without Guard receipt (got $STATUS, expected 403)"
            echo "   The Guard is NOT enforced — REQUIRE_GUARD may be misconfigured."
            exit 1
          else
            echo "✅ PASS: Platform correctly rejected direct request with 403 (Guard is enforced)"
          fi

          echo ""
          echo "Sending request VIA GUARD (port ${{ env.GUARD_PORT }}) — must return 200"
          STATUS_VIA_GUARD=$(curl -s -o /tmp/guard-response.json -w "%{http_code}" \
            -X POST "http://localhost:${{ env.GUARD_PORT }}/api/v1/help" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $CLIENT_KEY" \
            -d '{"apiKey":"'"$CLIENT_KEY"'","question":"Guard bypass test","signPublicKey":"test","encryptPublicKey":"test"}')

          echo "Via-Guard response: HTTP $STATUS_VIA_GUARD"
          cat /tmp/guard-response.json

          if [ "$STATUS_VIA_GUARD" != "200" ] && [ "$STATUS_VIA_GUARD" != "201" ]; then
            echo "❌ FAIL: Request via Guard returned $STATUS_VIA_GUARD (expected 200/201)"
            exit 1
          else
            echo "✅ PASS: Request via Guard accepted ($STATUS_VIA_GUARD)"
          fi

      # ── Fail on HIGH or MEDIUM alerts ────────────────────────────────────
      - name: Check ZAP alert severity
        if: always()
        run: |
          if [ -f zap-report.json ]; then
            HIGH=$(jq '[.site[].alerts[] | select(.riskcode == "3")] | length' zap-report.json 2>/dev/null || echo "0")
            MEDIUM=$(jq '[.site[].alerts[] | select(.riskcode == "2")] | length' zap-report.json 2>/dev/null || echo "0")
            LOW=$(jq '[.site[].alerts[] | select(.riskcode == "1")] | length' zap-report.json 2>/dev/null || echo "0")

            echo "## 🔒 ZAP Security Results (via Guard port ${{ env.GUARD_PORT }})"
            echo "🔴 HIGH:   $HIGH"
            echo "🟡 MEDIUM: $MEDIUM"
            echo "🔵 LOW:    $LOW"

            if [ "$HIGH" -gt "0" ]; then
              echo ""
              echo "❌ HIGH severity vulnerabilities found:"
              jq -r '.site[].alerts[] | select(.riskcode == "3") | "  - \(.name): \(.desc | split("\n")[0])"' zap-report.json
              exit 1
            fi

            if [ "$MEDIUM" -gt "0" ]; then
              echo ""
              echo "⚠️  MEDIUM severity alerts (review required):"
              jq -r '.site[].alerts[] | select(.riskcode == "2") | "  - \(.name): \(.desc | split("\n")[0])"' zap-report.json
              # Medium alerts are warnings, not hard failures — uncomment exit 1 to enforce
              # exit 1
            fi

            echo "✅ No HIGH/MEDIUM severity vulnerabilities found."
          fi
