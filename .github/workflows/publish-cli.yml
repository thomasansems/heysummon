name: PUBLISH - CLI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.2.4). Leave empty to use root package.json version."
        required: false
        type: string
      dry_run:
        description: "Dry run (no actual publish)"
        required: false
        default: "false"
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG="${{ github.event.release.tag_name }}"
            echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync version to cli/package.json
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
        working-directory: cli

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: cli
        run: pnpm run build

      - name: Check if version already published
        id: check
        run: |
          if npm view @heysummon/app@${{ steps.version.outputs.value }} version 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false' && inputs.dry_run != 'true'
        working-directory: cli
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run publish
        if: inputs.dry_run == 'true'
        working-directory: cli
        run: pnpm publish --dry-run --access public --no-git-checks

      - name: Skip (already published)
        if: steps.check.outputs.exists == 'true'
        run: echo "Version ${{ steps.version.outputs.value }} already on npm — bump the version to publish."

      - name: Deprecate old 'heysummon' package
        if: steps.check.outputs.exists == 'false' && inputs.dry_run != 'true'
        run: npm deprecate heysummon "Moved to @heysummon/app — please update your install command." || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
