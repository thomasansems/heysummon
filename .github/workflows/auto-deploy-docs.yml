name: AUTO Deploy - Docs

on:
  push:
    branches: [main, staging]
    paths:
      - 'website/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy docs to Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IS_PROD: ${{ github.ref == 'refs/heads/main' }}
      VERCEL_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
      PROD_FLAG: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=$VERCEL_ENV --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}

      - name: Build docs site
        run: vercel build $PROD_FLAG --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt $PROD_FLAG --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}
