name: TEST - E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DATABASE_URL: file:${{ github.workspace }}/prisma/e2e-test.db

jobs:
  e2e:
    name: Extended E2E Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate
        env:
          DATABASE_URL: "file:./e2e-test.db"

      - name: Run migrations
        run: pnpm exec prisma db push --force-reset
        env:
          DATABASE_URL: "file:./e2e-test.db"

      - name: Seed E2E data
        id: seed
        run: |
          SEED_OUTPUT=$(bash e2e/seed-e2e.sh 2>/dev/null)
          echo "seed_json=$SEED_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "$SEED_OUTPUT" | jq .
        env:
          NEXTAUTH_SECRET: e2e-secret

      - name: Seed Playwright data
        run: pnpm exec tsx prisma/seed.ts
        env:
          DATABASE_URL: "file:./e2e-test.db"
          NEXTAUTH_SECRET: e2e-secret

      - name: Build
        run: pnpm run build
        env:
          NEXTAUTH_SECRET: e2e-secret

      - name: Start platform
        run: |
          pnpm start &
          for i in $(seq 1 30); do
            curl -s http://localhost:3000/api/v1/health && break || sleep 2
          done
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: e2e-secret
          PORT: 3000
          E2E_RATE_LIMIT_BYPASS_SECRET: e2e-bypass-secret-do-not-use-in-prod

      - name: Run bash E2E tests
        run: |
          SEED='${{ steps.seed.outputs.seed_json }}'
          export E2E_EXPERT_ID=$(echo "$SEED" | jq -r .expertId)
          export E2E_EXPERT_KEY=$(echo "$SEED" | jq -r .expertKey)
          export E2E_CLIENT_KEY=$(echo "$SEED" | jq -r .clientKey)
          export E2E_USER_ID=$(echo "$SEED" | jq -r .userId)
          export E2E_EXPERT2_KEY=$(echo "$SEED" | jq -r .expert2Key)
          export E2E_EXPERT2_CLIENT_KEY=$(echo "$SEED" | jq -r .expert2ClientKey)
          export E2E_INACTIVE_KEY=$(echo "$SEED" | jq -r .inactiveKey)
          export E2E_DEVICE_KEY=$(echo "$SEED" | jq -r .deviceKey)
          export E2E_DEVICE_TOKEN=$(echo "$SEED" | jq -r .deviceToken)
          export E2E_BASE_URL=http://localhost:3000
          export E2E_RATE_LIMIT_BYPASS_SECRET=e2e-bypass-secret-do-not-use-in-prod
          bash e2e/e2e-test.sh

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: pnpm exec playwright test tests/e2e/hitl-protocol.spec.ts tests/e2e/approval-flow.spec.ts tests/e2e/active-monitor.spec.ts tests/e2e/consumer-message.spec.ts tests/e2e/lifecycle.spec.ts
        env:
          BASE_URL: http://localhost:3000
          HEYSUMMON_MONITOR_INTERVAL_MS: "2000"
